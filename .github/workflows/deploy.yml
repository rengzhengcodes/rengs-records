name: Deploy to GitHub Pages

on:
  # Trigger the workflow on every push to the `main` branch.
  push:
    branches: [ main ]
  # Trigger when Resume-by-Reng-Zheng dispatches an update.
  repository_dispatch:
    types: [resume-updated]
  # Allows the workflow to be manually run from the Github Actions tab.
  workflow_dispatch:

# Avoid overlapping deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

# Required permissions for GitHub Pages deployment.
permissions:
  contents: read         # Allows cloning and reading repository contents.
  pages: write           # Allows pushing site output to GitHub Pages.
  id-token: write        # Required for GitHub Actions authentication.

jobs:
  # Build job: checks out the code and builds the Astro site.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.RESUME_DEPLOY_KEY }}

      - name: Build resume PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: public/bio/Resume-by-Reng-Zheng
          root_file: main.tex

      - name: Install dependencies, build site, and upload for deployment
        uses: withastro/action@v4
        with:
          node-version: 22
          path: ./
          package-manager: pnpm@9

  # Deploy job: uploads the built site to GitHub Pages.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
